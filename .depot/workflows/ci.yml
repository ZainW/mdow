# Depot CI Migration
# Source: .github/workflows/ci.yml
#
# Changes made:
# - Changed runs-on from "macos-latest" to "depot-ubuntu-latest" in job "build"

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: depot-ubuntu-latest # was: macos-latest. Nonstandard GitHub runner label detected, changed to default Depot runner.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run fmt:check
      - run: pnpm run test
      - run: pnpm run --filter desktop build:dist -- --linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
