name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - parallel:
          - name: Typecheck
            run: pnpm run typecheck

          - name: Lint
            run: pnpm run lint

          - name: Format check
            run: pnpm run fmt:check

          - name: Test
            run: pnpm run test

      - name: Build
        run: pnpm run build
