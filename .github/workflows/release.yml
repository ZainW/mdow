name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
        if: matrix.platform == 'mac'

      - run: pnpm run test
        if: matrix.platform == 'mac'

      - name: Build, sign, and publish (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "${{ secrets.CSC_LINK }}" | base64 -d -o "$CERT_PATH"
          KEYCHAIN_PATH=$RUNNER_TEMP/mdow-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          export CSC_LINK="$CERT_PATH"
          export CSC_KEYCHAIN="$KEYCHAIN_PATH"
          pnpm run --filter desktop publish

      - name: Build and publish (Windows/Linux)
        if: matrix.platform != 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run --filter desktop publish

      # Push version + sha256 to ZainW/homebrew-mdow (needs cross-repo write access).
      - run: pnpm run --filter desktop release:homebrew
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
