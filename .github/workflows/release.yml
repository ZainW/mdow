name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
        if: matrix.platform == 'mac'

      - run: pnpm run test
        if: matrix.platform == 'mac'

      - name: Import Apple signing certificate
        if: matrix.platform == 'mac'
        run: |
          KEYCHAIN_PATH=$(mktemp -d)/mdow-signing.keychain-db
          KEYCHAIN_PW=$(openssl rand -base64 32)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PW=$KEYCHAIN_PW" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          echo "${{ secrets.CSC_LINK }}" | base64 -d > /tmp/mdow-signing.p12
          security import /tmp/mdow-signing.p12 -k "$KEYCHAIN_PATH" -P "${{ secrets.CSC_KEY_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/["]//g')
          rm /tmp/mdow-signing.p12

      - run: pnpm run --filter desktop publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
          CSC_KEYCHAIN_PASSWORD: ${{ env.KEYCHAIN_PW }}
          CSC_NAME: 'ZAIN XERXES WANIA (XU3M3P2M34)'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Push version + sha256 to ZainW/homebrew-mdow (needs cross-repo write access).
      - run: pnpm run --filter desktop release:homebrew
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
